<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" type="text/css" href="{{_res_path}}/common/common.css"/>
  <style>
    /* 成就分类详情 — 左侧边框列表 */

    .cat-header {
      margin-bottom: 8px;
      font-size: 13px;
      color: #8890a8;
    }

    .ach-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    /* 基础条目样式 */
    .ach-item {
      padding: 8px 12px;
      border-left: 3px solid rgba(255, 255, 255, 0.12);
      border-radius: 0 6px 6px 0;
      background: rgba(255, 255, 255, 0.03);
    }

    .ach-item .ach-name {
      font-size: 14px;
      font-weight: 600;
      color: #d0d8e0;
      margin-bottom: 2px;
    }
    .ach-item .ach-desc {
      font-size: 12px;
      color: #8890a8;
      line-height: 1.5;
    }
    .ach-item .ach-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 3px;
    }

    /* 标签 */
    .tag {
      display: inline-block;
      padding: 1px 6px;
      font-size: 11px;
      border-radius: 3px;
      font-weight: 600;
    }

    /* 稀有度 Low */
    .ach-item.ach-rarity-low {
      border-left-color: rgba(100, 160, 100, 0.5);
    }
    .tag-rarity-low {
      color: #5aaa5a;
      background: rgba(90, 170, 90, 0.12);
    }

    /* 稀有度 Mid */
    .ach-item.ach-rarity-mid {
      border-left-color: rgba(200, 170, 80, 0.5);
    }
    .tag-rarity-mid {
      color: #c8aa50;
      background: rgba(200, 170, 80, 0.12);
    }

    /* 稀有度 High */
    .ach-item.ach-rarity-high {
      border-left-color: #d3bc8e;
      background: rgba(211, 188, 142, 0.06);
    }
    .tag-rarity-high {
      color: #d3bc8e;
      background: rgba(211, 188, 142, 0.15);
    }

    /* 隐藏成就标签 */
    .tag-hidden {
      color: #d06464;
      background: rgba(208, 100, 100, 0.12);
    }

    /* 汇总 */
    .sum-line {
      margin-top: 12px;
      font-size: 12px;
      color: #707888;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="game-name">{{gameName}} · 成就</div>
    <div class="title">{{categoryName}}</div>
    <div class="subtitle">共 {{total}} 项成就</div>
  </div>

  <div class="ach-list">
    {{each achievements ach}}
    <div class="ach-item ach-rarity-{{ach.rarityLower}}">
      <div class="ach-meta">
        {{if ach.rarityLabel}}
        <span class="tag tag-rarity-{{ach.rarityLower}}">{{ach.rarityLabel}}</span>
        {{/if}}
        {{if ach.isHidden}}
        <span class="tag tag-hidden">隐藏</span>
        {{/if}}
      </div>
      <div class="ach-name">{{ach.name}}</div>
      {{if ach.desc}}
      <div class="ach-desc">{{ach.desc}}</div>
      {{/if}}
    </div>
    {{/each}}
  </div>

  <div class="sum-line">Low 低稀有度 · Mid 中稀有度 · High 高稀有度</div>

  <div class="copyright">Data from nanoka.cc · Atlas-Plugin</div>
</body>
</html>
