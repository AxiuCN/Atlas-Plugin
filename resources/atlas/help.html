<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" type="text/css" href="{{_res_path}}/common/common.css"/>
  <style>
    .help-section {
      margin-bottom: 18px;
    }
    .help-section-title {
      font-size: 15px;
      font-weight: 600;
      color: #b0b8d0;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .help-item {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .help-item:last-child {
      border-bottom: none;
    }
    .help-cmd {
      font-size: 14px;
      font-weight: 600;
      color: #d3bc8e;
      min-width: 180px;
      white-space: nowrap;
    }
    .help-desc {
      font-size: 13px;
      color: #8890a8;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="game-name">Atlas-Plugin</div>
    <div class="title">{{helpCfg.title || '#Atlas图鉴帮助'}}</div>
    {{if helpCfg.subTitle}}
    <div class="subtitle">{{helpCfg.subTitle}}</div>
    {{/if}}
  </div>

  {{each helpGroup group}}
  <div class="help-section">
    <div class="help-section-title">{{group.group}}</div>
    {{each group.list item}}
    <div class="help-item">
      <span class="help-cmd">{{item.title}}</span>
      <span class="help-desc">{{item.desc}}</span>
    </div>
    {{/each}}
  </div>
  {{/each}}

  <div class="copyright">Data from nanoka.cc · Atlas-Plugin</div>
</body>
</html>
