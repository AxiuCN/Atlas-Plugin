<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" type="text/css" href="{{_res_path}}/common/common.css"/>
</head>
<body>
  <div class="hero">
    <div class="hero-game">{{gameName}} · {{keyword}}</div>
    <div class="hero-title">成就分类</div>
    {{if total}}
    <div class="hero-subtitle">共 {{total}} 条成就，{{groups.length}} 个分类</div>
    {{/if}}
  </div>

  <div class="achievement-grid">
    {{each groups group}}
    <div class="achievement-card">
      <div class="ac-name">{{group.title}}</div>
      <div class="ac-count">{{group.items.length}} 条</div>
    </div>
    {{/each}}
  </div>

  <div class="hint">成就数据来自 nanoka.cc</div>
  <div class="copyright">Data from nanoka.cc · Atlas-Plugin</div>
</body>
</html>
